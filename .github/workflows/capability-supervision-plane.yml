name: capability-supervision-plane

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-capability-supervision-plane:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci
      - run: npm run build --if-present
      - run: node scripts/verify-capability-supervision-ledger.mjs
