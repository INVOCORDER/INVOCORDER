name: public-hostile-fixture-consumption

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-public-hostile-fixture-consumption:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify public hostile fixture consumption receipt
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/verify-public-hostile-fixture-consumption-receipt.mjs
