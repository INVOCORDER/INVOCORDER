name: public-release-auditor-runner-consumption

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  verify-public-release-auditor-runner-consumption:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run build --if-present
      - run: node scripts/verify-public-release-auditor-runner-consumption.mjs
