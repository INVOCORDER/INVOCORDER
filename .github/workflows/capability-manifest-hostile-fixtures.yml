name: capability-manifest-hostile-fixtures

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  capability-manifest-hostile-fixtures:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build --if-present
      - run: node scripts/verify-capability-manifest-hostile-fixtures.mjs
