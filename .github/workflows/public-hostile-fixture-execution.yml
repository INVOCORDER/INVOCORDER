name: verify-public-hostile-fixture-execution

on:
  pull_request:
  push:

jobs:
  verify-public-hostile-fixture-execution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build --if-present
      - run: node scripts/verify-public-org-perimeter-ledger.mjs
      - run: node scripts/verify-public-hostile-fixture-consumption-receipt.mjs
      - run: node scripts/verify-public-hostile-fixture-execution-receipt.mjs
